name: Quality gate

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python reference
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install isolated test dependencies
        run: |
          python -m pip install --requirement requirements-test.txt
          python -m pip check

      - name: Run default Python tests
        run: |
          mkdir -p TestResults/python
          python -m pytest -q --junitxml=TestResults/python/pytest.xml

      - name: Verify retained Python test count
        run: >-
          python scripts/verify-test-counts.py
          --python-results TestResults/python/pytest.xml

      - name: Publish Python test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: python-test-results
          path: TestResults/python
          if-no-files-found: ignore
          retention-days: 7

  dotnet:
    name: .NET solution
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up test-result parser
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('global.json', 'Directory.Build.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore and audit NuGet dependencies
        run: dotnet restore GoalKeeper.sln --verbosity minimal

      - name: Verify .NET formatting
        run: >-
          dotnet format GoalKeeper.sln
          --verify-no-changes
          --no-restore
          --verbosity minimal

      - name: Build with compiler and analyzer warnings as errors
        run: >-
          dotnet build GoalKeeper.sln
          --configuration Release
          --no-restore
          --verbosity minimal

      - name: Run complete .NET solution test suite
        run: |
          mkdir -p TestResults/dotnet
          dotnet test GoalKeeper.sln \
            --configuration Release \
            --no-build \
            --maxcpucount:1 \
            --logger trx \
            --results-directory TestResults/dotnet

      - name: Verify retained .NET test count
        run: >-
          python scripts/verify-test-counts.py
          --dotnet-results TestResults/dotnet

      - name: Publish .NET test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: dotnet-test-results
          path: TestResults/dotnet
          if-no-files-found: ignore
          retention-days: 7
